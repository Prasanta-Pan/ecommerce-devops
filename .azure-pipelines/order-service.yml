# Order Service — Build & Deploy Pipeline
# Pulls code from: github.com/Prasanta-Pan/order-service
# Deploys to: AKS (Dev auto / UAT manual / Prod manual with approval)
#
# SETUP in Azure DevOps:
# - Service connections: github-connection, acr-connection, aks-connection
# - Variable groups: env-dev-vars, env-uat-vars, env-prod-vars
# - Environments: development, uat, production (add approval gates on uat + production)

trigger: none
pr: none

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: dev
    values:
      - dev
      - uat
      - prod

resources:
  repositories:
    - repository: order_service
      type: github
      name: Prasanta-Pan/order-service
      endpoint: github-connection

variables:
  - name: IMAGE_NAME
    value: order-service
  - name: JAVA_VERSION
    value: '21'
  - ${{ if eq(parameters.environment, 'dev') }}:
    - group: env-dev-vars
  - ${{ if eq(parameters.environment, 'uat') }}:
    - group: env-uat-vars
  - ${{ if eq(parameters.environment, 'prod') }}:
    - group: env-prod-vars

stages:

  - stage: CI
    displayName: 'Build & Test'
    jobs:
      - job: Build_Test
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: order_service

          - task: JavaToolInstaller@0
            displayName: 'Install Java $(JAVA_VERSION)'
            inputs:
              versionSpec: $(JAVA_VERSION)
              jdkArchitectureOption: x64
              jdkSourceOption: PreInstalled

          - task: Maven@4
            displayName: 'Build & Test'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean verify'
              options: '-Dspring.profiles.active=local'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'
              javaHomeOption: JDKVersion
              jdkVersionOption: $(JAVA_VERSION)

  - stage: Docker
    displayName: 'Build & Push Image'
    dependsOn: CI
    condition: succeeded()
    jobs:
      - job: Docker_Push
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: order_service

          - task: Docker@2
            displayName: 'Build & Push to ACR'
            inputs:
              command: buildAndPush
              repository: $(IMAGE_NAME)
              dockerfile: '$(System.DefaultWorkingDirectory)/docker/order-service/Dockerfile'
              buildContext: '$(System.DefaultWorkingDirectory)'
              containerRegistry: acr-connection
              tags: |
                $(Build.BuildId)
                ${{ parameters.environment }}-latest

  - stage: Deploy_Dev
    displayName: 'Deploy → Dev'
    dependsOn: Docker
    condition: and(succeeded(), eq('${{ parameters.environment }}', 'dev'))
    jobs:
      - deployment: Deploy
        pool:
          vmImage: 'ubuntu-latest'
        environment: development
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: KubernetesManifest@1
                  displayName: 'Deploy to AKS Dev'
                  inputs:
                    action: deploy
                    connectionType: azureResourceManager
                    azureSubscriptionConnection: aks-connection
                    azureResourceGroup: $(AKS_RESOURCE_GROUP)
                    kubernetesCluster: $(AKS_CLUSTER_NAME)
                    namespace: $(K8S_NAMESPACE)
                    manifests: |
                      k8s/order-service/deployment.yaml
                      k8s/order-service/service.yaml
                      k8s/order-service/configmap.yaml
                      k8s/order-service/hpa.yaml
                    containers: '$(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.BuildId)'

  - stage: Deploy_UAT
    displayName: 'Deploy → UAT'
    dependsOn: Docker
    condition: and(succeeded(), eq('${{ parameters.environment }}', 'uat'))
    jobs:
      - deployment: Deploy
        pool:
          vmImage: 'ubuntu-latest'
        environment: uat
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: KubernetesManifest@1
                  displayName: 'Deploy to AKS UAT'
                  inputs:
                    action: deploy
                    connectionType: azureResourceManager
                    azureSubscriptionConnection: aks-connection
                    azureResourceGroup: $(AKS_RESOURCE_GROUP)
                    kubernetesCluster: $(AKS_CLUSTER_NAME)
                    namespace: $(K8S_NAMESPACE)
                    manifests: |
                      k8s/order-service/deployment.yaml
                      k8s/order-service/service.yaml
                      k8s/order-service/configmap.yaml
                      k8s/order-service/hpa.yaml
                    containers: '$(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.BuildId)'

  - stage: Deploy_Prod
    displayName: 'Deploy → Prod'
    dependsOn: Docker
    condition: and(succeeded(), eq('${{ parameters.environment }}', 'prod'))
    jobs:
      - deployment: Deploy
        pool:
          vmImage: 'ubuntu-latest'
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: KubernetesManifest@1
                  displayName: 'Deploy to AKS Prod'
                  inputs:
                    action: deploy
                    connectionType: azureResourceManager
                    azureSubscriptionConnection: aks-connection
                    azureResourceGroup: $(AKS_RESOURCE_GROUP)
                    kubernetesCluster: $(AKS_CLUSTER_NAME)
                    namespace: $(K8S_NAMESPACE)
                    manifests: |
                      k8s/order-service/deployment.yaml
                      k8s/order-service/service.yaml
                      k8s/order-service/configmap.yaml
                      k8s/order-service/hpa.yaml
                    containers: '$(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.BuildId)'
