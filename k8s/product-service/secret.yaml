apiVersion: v1
kind: Secret
metadata:
  name: product-service-secret
  namespace: ecommerce
  labels:
    app: product-service
type: Opaque
data:
  # All values must be base64-encoded.
  # To encode: echo -n 'your-value' | base64
  #
  # DB_USER: base64("<your-postgres-username>")
  DB_USER: cG9zdGdyZXM=

  # DB_PASSWORD: base64("<your-postgres-password>")
  DB_PASSWORD: CHANGE_ME_BASE64_ENCODED_PASSWORD==

  # AZURE_TENANT_ID: base64("<your-azure-tenant-id>")
  AZURE_TENANT_ID: CHANGE_ME_BASE64_ENCODED_TENANT_ID==

  # AZURE_CLIENT_ID: base64("<your-azure-client-id>")
  AZURE_CLIENT_ID: CHANGE_ME_BASE64_ENCODED_CLIENT_ID==
