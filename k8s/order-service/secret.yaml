# =============================================================================
# SECRET TEMPLATE — replace all <base64-encoded-value> placeholders before applying.
#
# Encode values:  echo -n "my-secret-value" | base64
# Apply:          kubectl apply -f k8s/secret.yaml
#
# WARNING: Never commit real secrets to source control.
# Use Azure Key Vault + Secrets Store CSI Driver in production.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secrets
  namespace: ecommerce
type: Opaque
data:
  DB_USER: <base64-encoded-db-username>
  DB_PASSWORD: <base64-encoded-db-password>
  AZURE_TENANT_ID: <base64-encoded-azure-tenant-id>
  AZURE_CLIENT_ID: <base64-encoded-azure-client-id>
  AZURE_EVENTHUB_CONNECTION_STRING: <base64-encoded-eventhub-connection-string>
